---
- name: Harden Ubuntu operating system baseline
  hosts: all
  become: true
  gather_facts: true

  vars:
    sysctl_config_path: /etc/sysctl.d/99-vps-hardening.conf
    crowdsec_key_source_path: /etc/apt/keyrings/crowdsec_crowdsec-archive-keyring.key
    crowdsec_keyring_path: /etc/apt/keyrings/crowdsec_crowdsec-archive-keyring.gpg
    sysctl_settings:
      - name: net.ipv4.conf.all.rp_filter
        value: "1"
      - name: net.ipv4.conf.default.rp_filter
        value: "1"
      - name: net.ipv4.conf.all.accept_source_route
        value: "0"
      - name: net.ipv4.conf.default.accept_source_route
        value: "0"
      - name: net.ipv4.conf.all.accept_redirects
        value: "0"
      - name: net.ipv4.conf.default.accept_redirects
        value: "0"
      - name: net.ipv4.conf.all.secure_redirects
        value: "0"
      - name: net.ipv4.conf.default.secure_redirects
        value: "0"
      - name: net.ipv4.conf.all.send_redirects
        value: "0"
      - name: net.ipv4.conf.default.send_redirects
        value: "0"
      - name: net.ipv4.tcp_syncookies
        value: "1"
      - name: net.ipv4.tcp_synack_retries
        value: "5"
      - name: kernel.dmesg_restrict
        value: "1"
      - name: kernel.unprivileged_bpf_disabled
        value: "1"

  pre_tasks:
    - name: Ensure the target is a supported Ubuntu release
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_version is version('22.04', '>=')
          - ansible_kernel is version('5.15', '>=')
        fail_msg: "Phase 2 hardening supports Ubuntu 22.04+ with Linux 5.15+ kernels."

    - name: Validate hardening sysctl keys exist on the target kernel
      ansible.builtin.command: "sysctl -n {{ item.name }}"
      loop: "{{ sysctl_settings }}"
      register: sysctl_probe
      changed_when: false
      failed_when: false
      check_mode: false

    - name: Stop before applying unsupported sysctl keys
      ansible.builtin.assert:
        that:
          - sysctl_probe.results | selectattr('rc', 'ne', 0) | list | length == 0
        fail_msg: "At least one Phase 2 sysctl key is not available on this target kernel."

  tasks:
    - name: Install hardening package prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - unattended-upgrades
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Deploy validated sysctl hardening configuration
      ansible.builtin.copy:
        dest: "{{ sysctl_config_path }}"
        owner: root
        group: root
        mode: "0644"
        content: |
          # Managed by AegisNode.
          {% for setting in sysctl_settings %}
          {{ setting.name }} = {{ setting.value }}
          {% endfor %}
      notify: Reload active sysctl variables

    - name: Enable unattended security upgrades
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    - name: Ensure apt keyring directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check CrowdSec repository signing keyring
      ansible.builtin.stat:
        path: "{{ crowdsec_keyring_path }}"
      register: crowdsec_keyring

    - name: Download CrowdSec repository signing key
      ansible.builtin.get_url:
        url: https://packagecloud.io/crowdsec/crowdsec/gpgkey
        dest: "{{ crowdsec_key_source_path }}"
        owner: root
        group: root
        mode: "0644"
      register: crowdsec_key

    - name: Install CrowdSec repository signing key
      ansible.builtin.command:
        argv:
          - gpg
          - --dearmor
          - --yes
          - --output
          - "{{ crowdsec_keyring_path }}"
          - "{{ crowdsec_key_source_path }}"
      when: crowdsec_key.changed or not crowdsec_keyring.stat.exists

    - name: Ensure CrowdSec repository signing key permissions
      ansible.builtin.file:
        path: "{{ crowdsec_keyring_path }}"
        state: file
        owner: root
        group: root
        mode: "0644"

    - name: Configure CrowdSec apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/crowdsec_crowdsec.list
        owner: root
        group: root
        mode: "0644"
        content: |
          deb [signed-by={{ crowdsec_keyring_path }}] https://packagecloud.io/crowdsec/crowdsec/any any main

    - name: Install CrowdSec security agent
      ansible.builtin.apt:
        name: crowdsec
        state: present
        update_cache: true

    - name: Ensure CrowdSec is enabled and running
      ansible.builtin.systemd_service:
        name: crowdsec
        enabled: true
        state: started

  handlers:
    - name: Reload active sysctl variables
      ansible.builtin.command: sysctl --system
