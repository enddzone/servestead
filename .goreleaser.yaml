version: 2

project_name: servestead

before:
  hooks:
    - go mod tidy
    - go tool templ generate

builds:
  - id: servestead
    main: ./backend
    binary: servestead
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

archives:
  - id: servestead
    ids:
      - servestead
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github

sboms:
  - id: archives
    artifacts: archive

release:
  mode: append
