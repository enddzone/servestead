name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true

permissions:
  contents: write
  packages: write
  security-events: write
  id-token: write
  attestations: write

env:
  GORELEASER_VERSION: v2.17.0
  SYFT_VERSION: v1.46.0
  TRIVY_VERSION: v0.72.0

jobs:
  binaries:
    name: Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate templ components
        run: go tool templ generate

      - name: Check generated templ output
        run: git diff --exit-code -- frontend

      - name: Install Syft
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL "https://raw.githubusercontent.com/anchore/syft/${SYFT_VERSION}/install.sh" | sh -s -- -b "$HOME/.local/bin" "$SYFT_VERSION"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          syft version

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.3
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest binary checksums
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-checksums: dist/checksums.txt

  image:
    name: GHCR image
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve image name
        id: image
        run: |
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/servestead" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: false
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.release.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.title=servestead
            org.opencontainers.image.description=Servestead CLI
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}

      - name: Attest image
        uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate image SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.image.outputs.name }}:${{ steps.release.outputs.tag }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          version: ${{ env.TRIVY_VERSION }}

      - name: Upload image SARIF
        uses: github/codeql-action/upload-sarif@v4.37.0
        with:
          sarif_file: trivy-image.sarif

      - name: Fail on high or critical image findings
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.image.outputs.name }}:${{ steps.release.outputs.tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          version: ${{ env.TRIVY_VERSION }}
