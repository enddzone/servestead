name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  GOLANGCI_LINT_VERSION: v2.11.4

jobs:
  test:
    name: Go quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up Go
        uses: actions/setup-go@v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Generate templ components
        run: go tool templ generate

      - name: Check generated templ output
        run: git diff --exit-code -- frontend

      - name: Check frontend assets
        run: |
          test -s frontend/assets/htmx.min.js
          test -s frontend/assets/htmx-ext-sse.js
          test -s frontend/assets/servestead.css
          test -s frontend/assets/servestead.js

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-only: true

      - name: Check Go formatting and imports
        run: golangci-lint fmt --diff

      - name: Lint
        run: golangci-lint run ./...

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race ./...

      - name: Test with coverage
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7.0.1
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: error

  sonar:
    name: Sonar
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v8.0.1
        with:
          name: go-coverage

      - name: Require Sonar token
        run: test -n "$SONAR_TOKEN"

      - name: Scan with SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@v8.2.1
        with:
          args: >
            -Dsonar.qualitygate.wait=true
