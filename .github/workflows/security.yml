name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "11 10 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

env:
  GOVULNCHECK_VERSION: v1.6.0
  TRIVY_VERSION: v0.72.0

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Check frontend assets
        run: |
          test -s frontend/assets/htmx.min.js
          test -s frontend/assets/htmx-ext-sse.js

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
          vulnerability-check: true
          license-check: false

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Generate SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          version: ${{ env.TRIVY_VERSION }}

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4.36.3
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on high or critical findings
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          version: ${{ env.TRIVY_VERSION }}
